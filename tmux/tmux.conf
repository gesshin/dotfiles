## Basic Tmux Controls
# tmux new -s [session-name]          : create a new session
# tmux kill-session -t [session-name] : delete a session
# tmux attach -t [session-name]       : attach to a session
# tmux detach                         : detach from the current session
# tmux ls                             : list all sessions

## Unbind All Keys
unbind -a

## Global Settings
setenv -g TMUX_PLUGIN_MANAGER_PATH ~/.tmux/plugins # change TPM plugin directory
set -g default-terminal "xterm-256color"           # enable true color
set -g prefix C-a                                  # change prefix key
set -g mouse on                                    # enable mouse
set -g history-limit 50000                         # scrollback buffer size
set -g set-clipboard on                            # use system clipboard
set -g base-index 1                                # index windows at 1
set -g renumber-windows on                         # renumber windows
set -g detach-on-destroy off                       # don"t exit tmux on kill-session
setw -g mode-keys vi                               # enable copy mode

## Bindings
bind C-a send-prefix                                                                # assign prefix
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display-message "RELOADED!" # reload config
bind I run-shell "~/.tmux/plugins/tpm/scripts/install_plugins.sh"                   # install plugins
bind -T copy-mode-vi "v" send -X begin-selection                                    # select in copy-mode
bind -T copy-mode-vi "y" send -X copy-selection                                     # copy in copy-mode
bind [ copy-mode                                                                    # enter copy-mode
bind ] paste-buffer                                                                 # paste buffer
bind s choose-session                                                               # session manager
bind w choose-window                                                                # window manager
bind c new-window                                                                   # create window
bind / split-window -h -c "#{pane_current_path}"                                    # create pane horizontal
bind - split-window -v -c "#{pane_current_path}"                                    # create pane vertical
bind R command-prompt -I "#{window_name}" "rename-window "%%""                      # rename window
bind ! kill-window                                                                  # kill window
bind x kill-pane                                                                    # kill pane
bind n next-window                                                                  # cycle next window
bind p previous-window                                                              # cycle prev window
bind 1 select-window -t 1                                                           # select window 1
bind 2 select-window -t 2                                                           # select window 2
bind 3 select-window -t 3                                                           # select window 3
bind 4 select-window -t 4                                                           # select window 4
bind 5 select-window -t 5                                                           # select window 5
bind 6 select-window -t 6                                                           # select window 6
bind 7 select-window -t 7                                                           # select window 7
bind 8 select-window -t 8                                                           # select window 8
bind 9 select-window -t 9                                                           # select window 9
bind 0 select-window -t 0                                                           # select window 0
bind -r h resize-pane -L 5                                                          # resize pane left
bind -r j resize-pane -D 5                                                          # resize pane down
bind -r k resize-pane -U 5                                                          # resize pane up
bind -r l resize-pane -R 5                                                          # resize pane right
bind -r m resize-pane -Z                                                            # zoom in/out pane

## Palette
source-file "$XDG_CONFIG_HOME/tmux/themes/$GLOBAL_THEME.conf"

## Status Line Config
set -g status on
set -g status-interval 60 

set -g @icon "󰈉"
set -g @sep-l ""
set -g @sep-r ""

set -g message-style "fg=#{@fg},bg=#{@bg}"

set -g pane-border-indicators "colour"
set -g pane-border-style "fg=#{@fg}"
set -g pane-active-border-style "fg=#{@purple}"

set -g window-status-style "bold"
set -g window-status-format \
"#[fg=#{@comment},bg=#{@bg}]#{@sep-l}\
#[fg=#{@bg},bg=#{@comment}] #I \
#[fg=#{@comment},bg=#{@bg}]#{@sep-r}"

set -g window-status-current-style "bold"
set -g window-status-current-format \
"#[fg=#{@purple},bg=#{@bg}]#{@sep-l}\
#[fg=#{@bg},bg=#{@purple}] #{?window_zoomed_flag,#W ,#W} \
#[fg=#{@purple},bg=#{@bg}]#{@sep-r}"

set -g status-left-length 100
set -g status-left-style "bold"
set -g status-left \
" #[fg=#{@cyan},bg=#{@bg}]#{?client_prefix,#[fg=#{@green}],}#{@sep-l}\
#[fg=#{@bg},bg=#{@cyan}]#{?client_prefix,#[bg=#{@green}],}#{@icon}\
#[fg=#{@cyan},bg=#{@bg}]#{?client_prefix,#[fg=#{@green}],}#{@sep-r} "

set -g status-right-length 100
set -g status-right-style "bold"
set -g status-right \
" #[fg=#{@comment},bg=#{@bg}]#{@sep-l}\
#[fg=#{@bg},bg=#{@comment}] #(sh $XDG_CONFIG_HOME/tmux/scripts/date.sh) \
#[fg=#{@comment},bg=#{@bg}]#{@sep-r} \
#[fg=#{@fg},bg=#{@bg}]#{@sep-l}\
#[fg=#{@bg},bg=#{@fg}] #(sh $XDG_CONFIG_HOME/tmux/scripts/wttr.sh) \
#[fg=#{@fg},bg=#{@bg}]#{@sep-r} \
#[fg=#{@pink},bg=#{@bg}]#{@sep-l}\
#[fg=#{@bg},bg=#{@pink}] #(sh $XDG_CONFIG_HOME/tmux/scripts/batt.sh) \
#[fg=#{@pink},bg=#{@bg}]#{@sep-r} "

## Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/yank"
set -g @plugin "tmux-plugins/tmux-ressurect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @plugin "christoomey/vim-tmux-navigator"

## Ressurect & Continuum Config
set -g @continuum-restore "on"
set -g @resurrect-strategy-nvim "session"

## Initialize TMUX plugin manager (keep this line at the very bottom of .tmux.conf)
run -b "~/.tmux/plugins/tpm/tpm"
